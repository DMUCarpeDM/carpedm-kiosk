<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 태블릿 키오스크: 핀치줌 금지, 노치·홈바 영역까지 사용 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#da291c" />
    <!-- iPad: 홈 화면에 추가 시 Safari UI 없는 전체화면 실행 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="키오스크" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>롯데리아 키오스크</title>
    <!-- 폰트는 로컬 내장(src/styles/fonts.css + public/fonts). 외부 CDN 의존 없음 —
         현장 인터넷이 없어도 로고·한글이 깨지지 않는다. 첫 화면에 쓰는 로고·본문
         글꼴을 미리 불러 첫 페인트에서 폴백 글꼴이 잠깐 비치는 것을 막는다. -->
    <link rel="preload" href="/fonts/noto-kr-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fredoka-700.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
