# 고령층 표현 사전 v1 — 롯데리아 도메인 (가설판)
# ⚠ 전부 가설이다. 7월 현장 실증에서 수집한 실제 표현으로 교체한다.
# 이 파일만 바꾸면 재배포 없이 매핑이 갱신된다 (FR-D3).
# phrases: 어르신이 쓸 법한 표현 (부분 일치, 긴 구절 우선) / ids: 후보 메뉴 (2개 이상이면 되묻기 대상)

